# Server Configuration
server.port=${PORT:8080}

# Neon PostgreSQL Production Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.upload-folder=hotel_booking_system

# Upload directory for Render
upload.dir=/tmp/uploads/hotels

# Static Resource Handling
spring.web.resources.static-locations=classpath:/static/,file:/tmp/uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Allowed Origins
app.cors.allowed-origins=https://hotelbooking-theta-sooty.vercel.app,https://hotelbooking-ffh44w56b-aruns-projects-bdb09ea5.vercel.app,https://hotel-booking-frontend-topaz.vercel.app,https://hotelbookings-rbkzvxqs5-aruns-projects-bdb09ea5.vercel.app,http://localhost:5173,http://localhost:3000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=18000000000

# Spring Application Name
spring.application.name=OnlineHotelBookingSystem

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.example.ohbs=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG