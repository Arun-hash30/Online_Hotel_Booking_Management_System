# Active profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# Database Configuration - Use environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.upload-folder=hotel_booking_system

# Upload directory
upload.dir=/tmp/uploads/hotels

# Static Resource Handling
spring.web.resources.static-locations=classpath:/static/,file:/tmp/uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=18000000000

# Server Configuration
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# Spring Application Name
spring.application.name=OnlineHotelBookingSystem

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.example.ohbs=DEBUG
logging.level.org.hibernate.SQL=DEBUG